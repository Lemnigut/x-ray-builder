worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # HTTP — redirect to HTTPS + ACME challenge
    server {
        listen 80;
        server_name strugalem.ru www.strugalem.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://strugalem.ru$request_uri;
        }
    }

    # www → non-www redirect
    server {
        listen 443 ssl;
        server_name www.strugalem.ru;

        ssl_certificate     /etc/letsencrypt/live/strugalem.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/strugalem.ru/privkey.pem;

        return 301 https://strugalem.ru$request_uri;
    }

    # Main server
    server {
        listen 443 ssl;
        server_name strugalem.ru;

        ssl_certificate     /etc/letsencrypt/live/strugalem.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/strugalem.ru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html;
        index index.html;

        # SPA — all routes fallback to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
